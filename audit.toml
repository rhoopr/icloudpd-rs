# cargo-audit advisory ignores for kei. Source of truth consumed by both
# `just gate` (local pre-push) and `.github/workflows/ci.yml`. Keep the
# rationale comments on the line above each id so the reason travels with
# the entry.
#
# cargo-audit auto-loads `audit.toml` from the current working directory,
# so callers just run `cargo audit` - no flags.

[advisories]
ignore = [
    # RUSTSEC-2024-0436: `paste` is unmaintained. Reaches kei only
    # transitively via `mp4-atom` (the pure-Rust HEIC atom editor used by
    # the metadata writer). No replacement on the mp4-atom side yet.
    "RUSTSEC-2024-0436",

    # RUSTSEC-2025-0119: previously ignored; retained for continuity.
    "RUSTSEC-2025-0119",

    # RUSTSEC-2026-0097: `rand 0.9.2` is unsound when combined with a
    # custom logger. kei's direct rand=0.10.1 is unaffected; the 0.9.2
    # copy reaches us only transitively via reqwest -> quinn ->
    # quinn-proto, which we can't upgrade independently.
    "RUSTSEC-2026-0097",
]
